<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>People in Orbit</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="scene" id="scene">
      <img
        src="assets/pio.jpg"
        alt="People in Orbit"
        class="bg-image"
        id="bgImage"
      />
      <img
        src="assets/pio-dusk.jpg"
        alt=""
        class="bg-image bg-image--dusk"
        id="bgImageDusk"
      />

      <!-- Post-processing FX canvas -->
      <canvas class="fx-canvas" id="fxCanvas"></canvas>

      <!-- Hotspot layer — positioned to match the image exactly -->
      <div class="hotspot-layer" id="hotspotLayer">

        <!-- Turntable — plays music -->
        <button
          class="hotspot hotspot--turntable"
          id="turntableBtn"
          aria-label="Play music"
          title="Play music"
        >
          <span class="hotspot-icon">&#9654;</span>
        </button>

        <!-- Music notes container -->
        <div class="music-notes" id="musicNotes" aria-hidden="true"></div>

        <!-- Blue Vinyl Record — pre-order link -->
        <a
          href="https://peopleinorbit.bandcamp.com/album/viewpoint"
          target="_blank"
          rel="noopener"
          class="hotspot hotspot--vinyl"
          id="vinylBtn"
          aria-label="Pre-order Viewpoint"
          title="Pre-order Viewpoint"
        >
          <span class="hotspot-icon">&#128179;</span>
        </a>

        <!-- Button above TV — plays video unmuted -->
        <button
          class="hotspot hotspot--tv-play"
          id="tvPlayBtn"
          aria-label="Watch video"
          title="Watch video"
        >
          <span class="hotspot-icon">&#9654; WATCH</span>
        </button>

        <!-- TV Screen — click to return to logo -->
        <button
          class="hotspot hotspot--tv"
          id="tvBtn"
          aria-label="Watch video"
          title="Watch video"
        >
          <span class="hotspot-icon">&#9654;</span>
        </button>

        <!-- TV video container -->
        <div class="tv-screen" id="tvScreen">
          <!-- Default: logo -->
          <div class="tv-logo" id="tvLogo">
            <img src="assets/logo.svg" alt="People in Orbit" />
          </div>
          <div class="tv-static" id="tvStatic" style="display: none">
            <canvas id="staticCanvas"></canvas>
          </div>
          <!-- YouTube player (created by API) -->
          <div id="ytPlayer" class="tv-video"></div>
          <!-- Spotify iframe (only used in spotify mode) -->
          <iframe
            id="tvSpotify"
            class="tv-video"
            src=""
            frameborder="0"
            allow="autoplay; encrypted-media"
          ></iframe>
          <!-- Interaction blocker — prevents YouTube controls from showing -->
          <div class="tv-interact" id="tvInteract"></div>
          <!-- Custom timeline bar -->
          <div class="tv-timeline" id="tvTimeline">
            <div class="tv-timeline-progress" id="tvTimelineProgress"></div>
          </div>
          <!-- Volume indicator -->
          <div class="tv-volume" id="tvVolume">
            <div class="tv-volume-bar" id="tvVolumeBar"></div>
          </div>
          <!-- TV effects overlay -->
          <div class="tv-glare"></div>
          <div class="tv-vignette"></div>
          <div class="tv-scanlines"></div>
        </div>

        <!-- Warm Lamp — toggle dark/light -->
        <button
          class="hotspot hotspot--lamp"
          id="lampBtn"
          aria-label="Toggle lights"
          title="Toggle lights"
        >
          <span class="hotspot-icon">&#128161;</span>
        </button>

        <!-- TV power LED — on the bezel below the screen -->
        <div class="tv-led" id="tvLed"></div>

        <!-- Hifi LED — on the Vincent preamp -->
        <div class="hifi-led" id="hifiLed"></div>

        <!-- Speaker pulse overlays -->
        <div class="speaker speaker--left" id="speakerLeft"></div>
        <div class="speaker speaker--right" id="speakerRight"></div>

        <!-- Easter egg: Book spine -->
        <div class="hotspot hotspot--book" id="bookEgg" aria-label="Secret">
          <span class="tooltip">You found a secret! 🪐</span>
        </div>

      </div>

    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
